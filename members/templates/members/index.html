<!DOCTYPE html>
<html>
<head>
    <title>Klub A'zolari</title>
</head>
<body>

    <h1>Klub A'zolari Ro'yxati</h1>

    <table border="1" cellpadding="10" cellspacing="0">
        <thead>
            <tr>
                <th>Rasm (Avatar)</th>
                <th>Ism</th>
                <th>Familiya</th>
                <th>Telefon</th>
                <th>Yoshi</th>
                <th>Biografiya (Bio)</th>
            </tr>
        </thead>
        <tbody>
            {% for x in mymembers %}
            <tr>
                <td>
                    {% if x.avatar %}
                        <img src="/media/{{ x.avatar }}" width="100">
                    {% else %}
                        Rasm yo'q
                    {% endif %}
                </td>

                <td>{{ x.firstname }}</td>
                <td>{{ x.lastname }}</td>
                <td>{{ x.phone }}</td>
                <td>{{ x.age }}</td>
                <td>{{ x.bio }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</body>
</html>
